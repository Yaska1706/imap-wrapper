name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: 1.25
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | \ sh -s -- -b "$(PWD)" latest
      - name: Run linter
        run: |
          if [ -f go.mod ]; then
            golangci-lint run --timeout 10m -v ./...
          else
            echo "No go.mod found; skipping golangci-lint."
          fi

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: 1.25
      - name: Run unit tests
        run: |
          if [ -f go.mod ]; then
            go test ./...
          else
            go test ./...
          fi

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: 1.25
      - name: Run E2E tests
        env:
          CI: true
        run: |
          if [ -f go.mod ]; then
            go test -tags=e2e ./...
          else
            go test -tags=e2e ./...
          fi
